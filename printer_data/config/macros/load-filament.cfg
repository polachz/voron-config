[gcode_macro LOAD_FILAMENT]
gcode:
    # Uložení stavu tiskárny
    SAVE_GCODE_STATE NAME=load_state
    
    # Nastavení minimální bezpečné teploty (pokud není zadán parametr TEMP)
    {% set MIN_TEMP = 180 %}
    {% set REQUESTED_TEMP = params.TEMP|default(MIN_TEMP)|int %}
    
    # Určení cílové teploty: vezme se vyšší z hodnot (buď MIN_TEMP nebo zadaný TEMP)
    {% if REQUESTED_TEMP < MIN_TEMP %}
        {% set TARGET_TEMP = MIN_TEMP %}
    {% else %}
        {% set TARGET_TEMP = REQUESTED_TEMP %}
    {% endif %}
    
    # Načtení aktuální teploty extruderu
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    
    # Rozhodnutí o nahřívání
    {% if ACTUAL_TEMP < TARGET_TEMP %}
        {action_respond_info("Aktualni teplota (%0.1f°C) je nizsi nez cilova (%d°C). Nahrivam..." % (ACTUAL_TEMP, TARGET_TEMP))}
        M109 S{TARGET_TEMP}
    {% else %}
        {action_respond_info("Aktualni teplota (%0.1f°C) je dostatecna (cil: %d°C). Ponechavam a zacinam load." % (ACTUAL_TEMP, TARGET_TEMP))}
    {% endif %}

    # Samotný proces zavedení filamentu pro Stealthburner
    {action_respond_info("Zavedeni filamentu...")}
    M83
    
    # 1. Rychlé vtáhnutí filamentu k hotendu (těsně nad tavnou zónu)
    G1 E40 F1000     
    
    # 2. Pomalé protlačení tavnou zónou a tryskou (vyčištění/purge předchozího plastu)
    G1 E30 F200      
    
    {action_respond_info("Filament byl uspesne zaveden.")}
    
    # Obnovení stavu tiskárny
    RESTORE_GCODE_STATE NAME=load_state
    
[gcode_macro UNLOAD_FILAMENT]
gcode:
    # Uložení stavu tiskárny
    SAVE_GCODE_STATE NAME=unload_state
    
    # Nastavení minimální bezpečné teploty (pokud není zadán parametr TEMP)
    {% set MIN_TEMP = 180 %}
    {% set REQUESTED_TEMP = params.TEMP|default(MIN_TEMP)|int %}
    
    # Určení cílové teploty: vezme se vyšší z hodnot (buď MIN_TEMP nebo zadaný TEMP)
    {% if REQUESTED_TEMP < MIN_TEMP %}
        {% set TARGET_TEMP = MIN_TEMP %}
    {% else %}
        {% set TARGET_TEMP = REQUESTED_TEMP %}
    {% endif %}
    
    # Načtení aktuální teploty extruderu
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    
    # Rozhodnutí o nahřívání
    {% if ACTUAL_TEMP < TARGET_TEMP %}
        {action_respond_info("Aktualni teplota (%0.1f°C) je nizsi nez cilova (%d°C). Nahrivam..." % (ACTUAL_TEMP, TARGET_TEMP))}
        M109 S{TARGET_TEMP}
    {% else %}
        {action_respond_info("Aktualni teplota (%0.1f°C) je dostatecna (cil: %d°C). Ponechavam a zacinam unload." % (ACTUAL_TEMP, TARGET_TEMP))}
    {% endif %}

    # Samotný proces vysunutí filamentu
    {action_respond_info("Vysouvani filamentu...")}
    M83
    G1 E5 F300       # Rychlé zatlačení pro čistý konec
    G1 E-50 F2000     # Rychlý unload z meltzone (uprav délku podle extruderu)
    G1 E-50 F1000     # Pomalé dojetí zbytku cesty
    
    {action_respond_info("Filament byl uspesne vysunut.")}
    
    # Obnovení stavu tiskárny
    RESTORE_GCODE_STATE NAME=unload_state
    